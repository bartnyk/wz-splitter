name: Build Windows EXE

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Set EXE name
        run: |
          if ("${{ github.event_name }}" -eq "release") {
            echo "EXE_NAME=WZSplitter-${{ github.ref_name }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } else {
            echo "EXE_NAME=WZSplitter" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --clean --name "${{ env.EXE_NAME }}" main.py

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXE_NAME }}
          path: dist/${{ env.EXE_NAME }}.exe

      - name: Upload EXE to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.EXE_NAME }}.exe
